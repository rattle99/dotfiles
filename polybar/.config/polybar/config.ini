include-file = ~/.config/polybar/colorice-colors.ini

[bar/toph]
width = 96%
offset-x = 2%
height = 28pt
radius = 14

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0

padding-left = 2
padding-right = 0

module-margin-left = 1
module-margin-right = 0

; separator = |
; separator-foreground = ${colors.color8}

font-0 = JetBrainsMono Nerd Font Mono;2
font-1 = VL Gothic;2

modules-left = xworkspaces xwindow
modules-center = mpris
modules-right = filesystem pulseaudio memory cpu wlan battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.color8}
label-active-underline= ${colors.color4}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.color1}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.color8}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 60

mount-0 = /

label-mounted = %{F#8897F4}≤░ΜΛ%{F-} %percentage_used%%
label-unmounted = ≤░ΜΛ not mounted
label-unmounted-foreground = ${colors.color8}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%

ramp-volume-0 = ≤░Χ┐
ramp-volume-1 = ≤░ΨΑ
ramp-volume-2 = ≤░Χ╛
ramp-volume-foreground = ${colors.color4}

format-muted = <label-muted>
label-muted = ≤░ΨΒ muted
label-muted-foreground = ${colors.color8}

[module/memory]
type = internal/memory
interval = 10
format-prefix = "≤░αγ "
format-prefix-foreground = ${colors.color4}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 5
format-prefix = "≤░Ξδ "
format-prefix-foreground = ${colors.color4}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#a8899c}≤░νρ disconnected%{F-}

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#8897F4}≤░νρ%{F-} %essid%

[module/mpris]
type = custom/script
exec = bash -c 't=$(playerctl metadata title 2>/dev/null); [ ${#t} -gt 40 ] && echo "≤░ζγ ${t:0:40}έΑο" || echo "≤░ζγ $t"'
exec-if = playerctl status 2>/dev/null | grep -q "Playing"
interval = 5
click-left = ~/.config/polybar/now-playing-details.sh
label-foreground = ${colors.foreground}

[module/battery]
type = internal/battery
; check correct names with: ls /sys/class/power_supply/
battery = BAT1
adapter = AC
full-at = 99
poll-interval = 60

format-charging = <label-charging>
label-charging = %{F#8897F4}≤░ΓΕ%{F-} %percentage%%

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%

format-full = %{F#8897F4}≤░Β╣%{F-} %percentage%%

ramp-capacity-0 = %{F#B52A5B}≤░ΓΔ%{F-}
ramp-capacity-1 = %{F#8897F4}≤░Β║%{F-}
ramp-capacity-2 = %{F#8897F4}≤░Β╝%{F-}
ramp-capacity-3 = %{F#8897F4}≤░Β╛%{F-}
ramp-capacity-4 = %{F#8897F4}≤░ΓΑ%{F-}
ramp-capacity-5 = %{F#8897F4}≤░Β╣%{F-}

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.color4}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
