include-file = ~/.config/polybar/colorice-colors.ini

[bar/toph]
width = 100%
offset-x = 0%
height = 28pt
radius = 14

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 5pt
border-color = #00000000

offset-y = 8

padding-left = 2
padding-right = 2

module-margin-left = 1
module-margin-right = 0

; separator = |
; separator-foreground = ${colors.color8}

font-0 = JetBrainsMono Nerd Font Mono;2
font-1 = VL Gothic;2

modules-left = lb xworkspaces rb xwindow
modules-center = mpris
modules-right = lb filesystem pulseaudio memory cpu wlan battery rb lb date rb

fixed-center = true

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

group-by-monitor = false

label-active = %name%
label-active-background = ${colors.color8}
label-active-underline= ${colors.color4}
label-active-padding = 1

label-occupied = %name%
label-occupied-foreground = ${colors.color4}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.color1}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.color8}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 60

mount-0 = /

label-mounted = %{F#8897F4}ůįčä%{F-} %percentage_used%%
label-unmounted = ůįčä not mounted
label-unmounted-foreground = ${colors.color8}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%

ramp-volume-0 = ůįēŅ
ramp-volume-1 = ůįĖÄ
ramp-volume-2 = ůįēĺ
ramp-volume-foreground = ${colors.color4}

format-muted = <label-muted>
label-muted = ůįĖĀ muted
label-muted-foreground = ${colors.color8}

[module/memory]
type = internal/memory
interval = 10
format-prefix = "ůįėö "
format-prefix-foreground = ${colors.color4}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 5
format-prefix = "ůįćõ "
format-prefix-foreground = ${colors.color4}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#a8899c}ůį§® disconnected%{F-}

[module/wlan]
inherit = network-base
interface-type = wireless
format-connected = <ramp-signal> <label-connected>
label-connected = %essid%
ramp-signal-0 = %{F#a8899c}ůį§Į%{F-}
ramp-signal-1 = %{F#8897F4}ůį§ü%{F-}
ramp-signal-2 = %{F#8897F4}ůį§Ę%{F-}
ramp-signal-3 = %{F#8897F4}ůį§•%{F-}
ramp-signal-4 = %{F#8897F4}ůį§®%{F-}

[module/mpris]
type = custom/script
exec = bash -c 't=$(playerctl metadata title 2>/dev/null); [ ${#t} -gt 40 ] && echo "ůįĚö ${t:0:40}‚Ä¶" || echo "ůįĚö $t"'
exec-if = playerctl status 2>/dev/null | grep -q "Playing"
interval = 5
click-left = ~/.config/polybar/now-playing-details.sh
label-foreground = ${colors.foreground}

[module/battery]
type = internal/battery
; check correct names with: ls /sys/class/power_supply/
battery = BAT1
adapter = AC
full-at = 99
poll-interval = 60

format-charging = <label-charging>
label-charging = %{F#8897F4}ůįāĄ%{F-} %percentage%%

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%

format-full = %{F#8897F4}ůįĀĻ%{F-} %percentage%%

ramp-capacity-0 = %{F#B52A5B}ůįāÉ%{F-}
ramp-capacity-1 = %{F#8897F4}ůįĀļ%{F-}
ramp-capacity-2 = %{F#8897F4}ůįĀľ%{F-}
ramp-capacity-3 = %{F#8897F4}ůįĀĺ%{F-}
ramp-capacity-4 = %{F#8897F4}ůįāÄ%{F-}
ramp-capacity-5 = %{F#8897F4}ůįĀĻ%{F-}

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.color4}

[module/lb]
type = custom/text
format = [
format-foreground = ${colors.color4}

[module/rb]
type = custom/text
format = ]
format-foreground = ${colors.color4}

[module/separator]
type = custom/text
format = |
format-foreground = ${colors.color8}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
